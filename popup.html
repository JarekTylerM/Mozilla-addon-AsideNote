<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- tokens.css przed popup.css — popup.css konsumuje tokeny -->
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/popup.css" />
  </head>
  <body>
    <div class="popup-title" id="popup-title">Szybkie dodawanie</div>

    <div class="popup-capture" id="popup-capture">
      <span class="popup-capture__icon" aria-hidden="true"></span>
      <input
        id="popup-input"
        class="popup-capture__input"
        type="text"
        autocomplete="off"
        autofocus
      />
    </div>

    <div class="popup-hint-row">
      <div class="popup-hint" id="popup-hint"></div>
      <div class="popup-esc-hint" id="popup-esc-hint"></div>
      <button
        type="button"
        class="popup-help-btn"
        id="popup-help-btn"
        aria-expanded="false"
        aria-controls="popup-help-panel"
        title=""
      >
        ?
      </button>
    </div>

    <div class="popup-help-panel" id="popup-help-panel" hidden>
      <div id="popup-help-syntax"></div>
    </div>

    <div id="popup-preview" class="popup-preview" hidden></div>
    <div class="popup-feedback" id="popup-feedback"></div>

    <script src="scripts/popup.js" type="module"></script>
  </body>
</html>
